<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Авторизация</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="auth-card">
      <h1 class="auth-card__title">Добро пожаловать!</h1>
      <p class="auth-card__subtitle">Войдите в свой аккаунт</p>

      <form class="auth-form" action="#" method="post" novalidate>
        <label class="field-label" for="email">Email</label>
        <input id="email" class="field-input" type="email" placeholder="Введите свой e-mail">

        <label class="field-label" for="password">Пароль</label>
        <div class="password-wrap">
          <input id="password" class="field-input" type="password" placeholder="Введите пароль">
          <button class="eye-btn" type="button" aria-label="Показать пароль">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M1.7 12.02C2.77 10.05 5.96 6 12 6c6.05 0 9.23 4.06 10.3 6.03a.68.68 0 0 1 0 .65C21.24 14.67 18.05 18.74 12 18.74c-6.05 0-9.24-4.07-10.3-6.06a.66.66 0 0 1 0-.66Z" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="12" cy="12.36" r="3.2" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </button>
        </div>

        <div class="auth-form__row">
          <label class="remember">
            <input type="checkbox">
            <span class="remember__box"></span>
            <span class="remember__text">Запомнить меня</span>
          </label>
          <a href="#" class="forgot-link">Забыли пароль?</a>
        </div>

        <button class="btn btn--primary" type="button">Войти</button>

        <div class="divider">или</div>

        <button class="btn btn--secondary" type="button">Создать аккаунт</button>
      </form>
    </section>
  </main>
</body>
</html>
